version: '3.9'

services:
  # Local PostgreSQL — mirrors AWS RDS config
  postgres:
    image: postgres:15-alpine
    container_name: devops_interviewer_db
    environment:
      POSTGRES_DB: devops_interviewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devops_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops_interviewer_backend
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: devops_interviewer
      DB_USER: postgres
      DB_PASSWORD: devops_local_password
      DB_SSL: "false"
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops_interviewer_frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
